<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscription Cancelled — ReplyRadar</title>
<style>
:root{--bg:#0a0a0f;--surface:#14141f;--border:#1e1e30;--text:#e4e4ec;--muted:#8888a0;--accent:#6c5ce7;--green:#00d4aa;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{max-width:560px;margin:0 auto;padding:0 24px;text-align:center}
.icon{width:64px;height:64px;background:var(--surface);border:2px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:28px}
h1{font-size:28px;font-weight:700;margin-bottom:12px}
p{color:var(--muted);font-size:16px;margin-bottom:16px}
.btn{display:inline-block;padding:14px 28px;border-radius:var(--radius);font-size:16px;font-weight:600;text-decoration:none;transition:all .2s;border:none;cursor:pointer;margin:8px}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
</style>
</head>
<body>
<div class="container">
<div class="icon">↩</div>
<h1>No problem.</h1>
<p>Your subscription was cancelled. No charges were made.</p>
<p>Changed your mind? You can restart your subscription anytime.</p>
<div style="margin-top:24px">
<a href="/replyradar/#pricing" class="btn btn-primary">View Plans Again</a>
<a href="/replyradar/" class="btn btn-secondary">Back to Home</a>
</div>
<p style="margin-top:32px;font-size:13px;color:var(--muted)">Questions? Reply to any ReplyRadar email.</p>
</div>
</body>
</html>
